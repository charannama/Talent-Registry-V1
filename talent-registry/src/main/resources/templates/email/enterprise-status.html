<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Status</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 style="color: #0056b3;">Update on your Enterprise Registration</h2>
        <p>Hi <span th:text="${userName}">User</span>,</p>
        <p>Your enterprise account status has been updated.</p>
        <p th:text="${message}">Details here.</p>
        <p>Best regards,<br>The ZenCube Team</p>
    </div>
</body>
</html>
