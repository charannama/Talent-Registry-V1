###########################################################
# APPLICATION
###########################################################

spring.application.name=talent-registry

###########################################################
# SERVER
###########################################################

server.port=8080
server.servlet.context-path=/

spring.datasource.url=jdbc:postgresql://localhost:5432/talent_registry?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.h2.console.enabled=false

###########################################################
# HIKARI CONNECTION POOL
###########################################################

spring.datasource.hikari.pool-name=TalentRegistryPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

###########################################################
# JPA / HIBERNATE
###########################################################

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Use Flyway for schema management
spring.jpa.hibernate.ddl-auto=none

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

###########################################################
# FLYWAY
###########################################################

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=true

###########################################################
# LOGGING
###########################################################

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

###########################################################
# JACKSON
###########################################################

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

###########################################################
# SWAGGER / OPENAPI
###########################################################

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

###########################################################
# ACTUATOR (OPTIONAL)
###########################################################

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

###########################################################
# FILE UPLOAD
###########################################################

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

###########################################################
# JWT CONFIGURATION
###########################################################

