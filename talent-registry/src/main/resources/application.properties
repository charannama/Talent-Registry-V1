###########################################################
# APPLICATION
###########################################################

spring.application.name=talent-registry

###########################################################
# SERVER
###########################################################

server.port=8080
server.servlet.context-path=/

###########################################################
# DATASOURCE (POSTGRESQL)
###########################################################

spring.datasource.url=jdbc:postgresql://localhost:5432/talent_registry
spring.datasource.username=postgres
spring.datasource.password=charan
spring.datasource.driver-class-name=org.postgresql.Driver

###########################################################
# HIKARI CONNECTION POOL
###########################################################

spring.datasource.hikari.pool-name=TalentRegistryPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

###########################################################
# JPA / HIBERNATE
###########################################################

spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Use Flyway for schema management
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

###########################################################
# FLYWAY
###########################################################

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=true

###########################################################
# LOGGING
###########################################################

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

###########################################################
# JACKSON
###########################################################

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

###########################################################
# SWAGGER / OPENAPI
###########################################################

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

###########################################################
# ACTUATOR (OPTIONAL)
###########################################################

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

###########################################################
# FILE UPLOAD
###########################################################

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

###########################################################
# JWT CONFIGURATION
###########################################################

jwt.secret=5f4dcc3b5aa765d61d8327deb882cf995f4dcc3b5aa765d61d8327deb882cf99
jwt.issuer=zencube-talent-registry
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

###########################################################
# OAUTH2 CLIENT CONFIGURATION
###########################################################

spring.security.oauth2.client.registration.zencube.client-id=zencube-talent-registry-client
spring.security.oauth2.client.registration.zencube.client-secret=mock-secret-for-local-dev
spring.security.oauth2.client.registration.zencube.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.zencube.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.zencube.scope=openid,profile,email

spring.security.oauth2.client.provider.zencube.authorization-uri=https://sso.zencube.com/oauth2/authorize
spring.security.oauth2.client.provider.zencube.token-uri=https://sso.zencube.com/oauth2/token
spring.security.oauth2.client.provider.zencube.user-info-uri=https://sso.zencube.com/oauth2/userinfo
spring.security.oauth2.client.provider.zencube.user-name-attribute=email

###########################################################
# MAIL CONFIGURATION (MOCK FOR NOW)
###########################################################

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

###########################################################
# FRONTEND CONFIG
###########################################################
frontend.url=http://localhost:3000

# REGISTRATION CONFIG
app.registration.allow-duplicate-companies=false

# SECURITY LOCKOUT
security.lockout.max-attempts=5
security.lockout.duration-minutes=30